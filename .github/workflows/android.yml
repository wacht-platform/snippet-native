name: android

# Build the Android APK for free on GitHub's Linux runners and keep a single
# rolling "latest" pre-release up to date. Every push to main (or a manual run)
# rebuilds the release APK and replaces the asset on the `apk-latest` release,
# so there is always a stable public download URL you can open on the phone:
#
#   https://github.com/wacht-platform/snippet-native/releases/download/apk-latest/snippet.apk
#
# The release build self-signs with the debug key (see android/app/build.gradle.kts),
# so no keystore/secrets are needed to produce an installable APK.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create/update the rolling release + its tag

# One build at a time; a newer push supersedes an in-flight one.
concurrency:
  group: android-apk
  cancel-in-progress: true

jobs:
  build:
    name: build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # Sign every build with ONE stable keystore so successive APKs share a
      # signature and install as updates over each other (and over the original
      # box build). We decode the keystore to an explicit file and hand its path
      # to Gradle via SNIPPET_KEYSTORE (see android/app/build.gradle.kts) — NOT
      # via ~/.android/debug.keystore, because AGP's implicit debug-keystore
      # lookup resolves elsewhere on the runner and silently signs with a fresh
      # key, which is what made installs fail as "package appears to be invalid".
      - name: Restore the shared keystore
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          if [ -n "${DEBUG_KEYSTORE_B64:-}" ]; then
            printf '%s' "$DEBUG_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/snippet.keystore"
            echo "SNIPPET_KEYSTORE=$RUNNER_TEMP/snippet.keystore" >> "$GITHUB_ENV"
            echo "Restored the shared keystore ($(stat -c%s "$RUNNER_TEMP/snippet.keystore") bytes) for consistent signing."
          else
            echo "::warning::DEBUG_KEYSTORE_B64 secret not set — falling back to an auto-generated key; installs won't update over prior builds."
          fi

      - name: Build release APK (arm64 only — modern phones)
        # Universal APKs bundle every CPU ABI (arm64 + armeabi-v7a + x86_64), which
        # roughly triples the size (~70 MB) for no benefit on a real phone. arm64-v8a
        # covers essentially every Android device since ~2017; armeabi-v7a (ancient
        # 32-bit) and x86_64 (emulators) are dropped. Still one file → one stable URL.
        run: flutter build apk --release --target-platform android-arm64

      - name: Stage the APK under a stable name
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version:' pubspec.yaml | sed -E 's/version: *//')
          cp build/app/outputs/flutter-apk/app-release.apk snippet.apk
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Update the rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Latest APK
          prerelease: true
          # Move the tag to this commit so the release tracks the newest build.
          target_commitish: ${{ github.sha }}
          body: |
            Rolling development build of the snippet app — always the latest `main`.

            - version: `${{ steps.apk.outputs.version }}`
            - commit: `${{ steps.apk.outputs.sha }}`

            Install on Android: open **snippet.apk** below on your phone and tap it
            (allow "install unknown apps" if prompted). This is signed with a debug
            key, so if a previous build won't update, uninstall it first.
          files: snippet.apk
