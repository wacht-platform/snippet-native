name: snippet
description: "Remote control client (Android + macOS) for the snippet coding agent."
publish_to: 'none'
repository: https://github.com/wacht-platform/snippet-native
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  web_socket_channel: ^3.0.0
  shared_preferences: ^2.3.0
  flutter_zxing: ^2.3.0
  permission_handler: ^12.0.3
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.2.2
  flutter_foreground_task: ^9.2.2
  flutter_local_notifications: ^22.0.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  re_editor: ^0.9.0
  re_highlight: ^0.0.3
  iconsax_plus: ^1.0.0
  file_picker: ^8.1.7
  desktop_drop: ^0.7.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  media_store_plus: ^0.1.3
  open_filex: ^4.7.0
  video_player: ^2.11.1
  chewie: ^1.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0E0E0E"
  adaptive_icon_foreground: "assets/icon_fg.png"
  min_sdk_android: 21
